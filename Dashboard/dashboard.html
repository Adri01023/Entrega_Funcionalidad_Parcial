<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="dashboard.css">
    <title>Prueba Dashboard</title>
</head>

<body>

    <h1 id="titleDashboard">PyBusiness Analytics - Dashboard</h1>

    <div class="contenedor">

        <!-- Área del logo -->
        <div class="logo">
            <img src="icons/logo.svg" alt="Logo" class="logo-icon">
        </div>

        <!-- Sidebar lateral con logos vectoriales como links (a implementar) -->
        <nav class="sidebar">
            <!--Iconos obtenidos de https://icones.js.org/-->

            <a href="#" class="sidebar-item active">
                <img src="icons/home.svg" alt="Home" class="icon">
            </a>

            <a href="#" class="sidebar-item">
                <img src="icons/folder.svg" alt="Archivos" class="icon">
            </a>

            <a href="#" class="sidebar-item">
                <img src="icons/upload.svg" alt="Subir" class="icon">
            </a>

            <a href="#" class="sidebar-item">
                <img src="icons/charts.svg" alt="Dashboard" class="icon">
            </a>

            <a href="#" class="sidebar-item">
                <img src="icons/settings.svg" alt="Configuración" class="icon">
            </a>
        </nav>

        <!-- Barra de búsqueda -->
        <div class="search-bar">
            <input type="text" placeholder="Buscar..." class="search-input">
            <button class="search-button">
                <img src="icons/search.svg" alt="Buscar" class="search-icon">
            </button>
        </div>

        <!-- Panel de usuario que se empleará en el login -->
        <div class="user-panel">
            <img src="icons/user.svg" alt="Usuario" class="user-avatar">
            <div class="user-info">
                <span class="user-name">Juanito Alcachofa</span>
                <button class="logout-button">Cerrar sesión</button>
            </div>

        </div>

        <!-- Contenido principal del dashboard a actualizar (gráficas) -->
        <main class="main-content">
            <h1>Gráfica Resultante</h1>
            <div class="graph">
                <!--Placeholder de los gráficos-->
                <img src="graphs/sample1.jpeg" alt="">
                <!--
                <img src="graphs/sample2.jpeg" alt="">
                <img src="graphs/sample3.jpeg" alt="">
                <img src="graphs/sample4.jpeg" alt="">
                -->
            </div>
        </main>

    </div>

</body>

</html>
